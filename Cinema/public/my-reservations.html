<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 Rezervările Mele</title>
  <link rel="stylesheet" href="/assets/index.css" />
</head>
<body>
  <header>
    <nav class="main-nav">
      <a href="/index2" class="logo">🎬 Cinema Reservation</a>
      <ul class="nav-links">
        <li><a href="/shows">Shows</a></li>
        <li><a href="/logout">Logout</a></li>
        <li><span id="username"></span></li>
      </ul>
    </nav>
  </header>

  <div class="container_text" id="reservations-container">
    <h1>Rezervările Mele</h1>
    <p id="no-reservations">Încă nu ai nicio rezervare.</p>
    <a href="/shows" class="btn">Caută Filme</a>

   
    <div id="reservations-list"></div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>
        &copy; <span id="currentYear"></span> Toate drepturile rezervate.
        <a class="mesaj" href="/trimite-mesaj">Trimite un mesaj</a>
      </p>
    </div>
  </footer>

  <script>
    document.getElementById("currentYear").textContent = new Date().getFullYear();
    
    const email = sessionStorage.getItem("email");
    if (email) document.getElementById("username").textContent = email;

   
    async function loadReservations() {
      try {
        const res = await fetch("/api/my-reservations");
        const data = await res.json();

        const container = document.getElementById("reservations-list");
        const noRes = document.getElementById("no-reservations");

        if (data.length === 0) {
          noRes.style.display = "block";
        } else {
          noRes.style.display = "none";
          data.forEach(r => {
            const card = document.createElement("div");
            card.classList.add("reservation-card");
            card.innerHTML = `
              <h3>${r.movie_name} - ${r.cinema_name}</h3>
              <p>${r.description || ""}</p>
              <p>Data: ${new Date(r.date).toLocaleString()}</p>
              <p>Preț: $${r.price}</p>
              <p>Locuri rezervate: ${r.seats_reserved}</p>
            `;
            container.appendChild(card);
          });
        }
      } catch (e) {
        console.error(e);
      }
    }

    loadReservations();
  </script>
</body>
</html>
